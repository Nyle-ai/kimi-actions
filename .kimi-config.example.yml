# =============================================================================
# Kimi Actions Configuration
# =============================================================================
# Copy this file to your project root and rename to .kimi-config.yml
# =============================================================================

# Enable/disable Kimi Actions (default: true)
enabled: true

# =============================================================================
# Category Toggles
# =============================================================================
categories:
  bug: true           # Code defects
  performance: true   # Performance issues
  security: true      # Security vulnerabilities

# =============================================================================
# Skill Overrides
# =============================================================================
# Replace built-in skills with your custom skills from .kimi/skills/
#
# skill_overrides:
#   code-review: my-company-review
#
# Built-in skill names: code-review, describe, improve, ask

# =============================================================================
# Ignore Files
# =============================================================================
# Glob patterns excluded from the reviewed diff (in addition to the action's
# built-in strip list for lockfiles / minified / generated assets).
# Note: DB migrations are always reviewed and cannot be ignored here.
ignore_files:
  - "*.test.ts"
  - "*.spec.ts"
  - "**/__mocks__/**"
  - "**/__fixtures__/**"

# =============================================================================
# Extra Instructions
# =============================================================================
extra_instructions: |
  Focus on code maintainability.

# =============================================================================
# Ticket Context (optional)
# =============================================================================
# Resolve the ClickUp/Linear ticket linked to a PR (id like ENG-123 found in the
# title, branch, commits or body) and feed its intent to the reviewer.
# Requires the matching action secret(s): CLICKUP_TOKEN + CLICKUP_TEAM_ID, or LINEAR_API_KEY.
# ticket:
#   provider: linear   # or "clickup"

# =============================================================================
# Custom Skills (Claude Skills Standard)
# =============================================================================
# Create .kimi/skills/ directory in your repo:
#
# .kimi/skills/
# ├── react-review/
# │   ├── SKILL.md           # Required
# │   ├── scripts/           # Optional
# │   └── references/        # Optional
# └── company-rules/
#     └── SKILL.md
