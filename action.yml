name: 'AI Code Review'
description: 'AI-powered code review using Kimi (Moonshot AI) - supports /review and /ask commands'
author: 'xiaoju111a'
branding:
  icon: 'star'
  color: 'blue'

inputs:
  kimi_api_key:
    description: 'API key — either a LiteLLM virtual key or a direct Kimi/Moonshot API key'
    required: true
  kimi_base_url:
    description: 'Base URL for the LLM endpoint (defaults to LiteLLM proxy). Override with https://api.moonshot.ai/v1 or https://api.kimi.com/coding/v1 for direct Moonshot access.'
    required: false
    default: 'https://litellm.gettalentagent.com/v1'
  github_token:
    description: 'GitHub Token for PR operations'
    required: true
  language:
    description: 'Response language (en-US, zh-CN)'
    required: false
    default: 'en-US'
  model:
    description: 'Model name as configured in LiteLLM (or a direct Moonshot model ID like kimi-k2.7-code)'
    required: false
    default: 'kimi-code'
  review_level:
    description: 'Review strictness (strict, normal, gentle)'
    required: false
    default: 'normal'
  max_files:
    description: 'Maximum number of files to review'
    required: false
    default: '50'
  exclude_patterns:
    description: 'File patterns to exclude (comma-separated)'
    required: false
    default: '*.lock,*.min.js,*.min.css'
  auto_review:
    description: 'Auto review on PR open/sync (default: false, use /review command instead)'
    required: false
    default: 'false'
  enable_inline_comments:
    description: 'Post findings as inline review comments (with code suggestions) instead of one big comment'
    required: false
    default: 'true'
  enable_auto_resolve:
    description: 'Auto-resolve previously-flagged review threads once the code is fixed'
    required: false
    default: 'true'
  clickup_token:
    description: 'ClickUp API token for ticket context (optional; enable via ticket.provider in .kimi-config.yml)'
    required: false
    default: ''
  clickup_team_id:
    description: 'ClickUp team/workspace id, required to resolve custom task ids'
    required: false
    default: ''
  linear_api_key:
    description: 'Linear API key for ticket context (optional; enable via ticket.provider in .kimi-config.yml)'
    required: false
    default: ''

outputs:
  review_comment:
    description: 'The review comment posted to the PR'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      shell: bash
      run: pip install --no-cache-dir -r "${{ github.action_path }}/requirements.txt"

    - name: Run AI Code Review
      shell: bash
      run: python "${{ github.action_path }}/src/main.py"
      env:
        INPUT_KIMI_API_KEY: ${{ inputs.kimi_api_key }}
        INPUT_KIMI_BASE_URL: ${{ inputs.kimi_base_url }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
        INPUT_LANGUAGE: ${{ inputs.language }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_REVIEW_LEVEL: ${{ inputs.review_level }}
        INPUT_MAX_FILES: ${{ inputs.max_files }}
        INPUT_EXCLUDE_PATTERNS: ${{ inputs.exclude_patterns }}
        INPUT_AUTO_REVIEW: ${{ inputs.auto_review }}
        INPUT_ENABLE_INLINE_COMMENTS: ${{ inputs.enable_inline_comments }}
        INPUT_ENABLE_AUTO_RESOLVE: ${{ inputs.enable_auto_resolve }}
        INPUT_CLICKUP_TOKEN: ${{ inputs.clickup_token }}
        INPUT_CLICKUP_TEAM_ID: ${{ inputs.clickup_team_id }}
        INPUT_LINEAR_API_KEY: ${{ inputs.linear_api_key }}
